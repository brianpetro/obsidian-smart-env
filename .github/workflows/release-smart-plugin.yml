name: Reusable Smart Plugin Core Release

on:
  workflow_call:
    inputs:
      obsidian_smart_env_ref:
        description: Full commit SHA for brianpetro/obsidian-smart-env.
        required: true
        type: string
      jsbrains_ref:
        description: Full commit SHA for brianpetro/jsbrains.
        required: true
        type: string
      node_version:
        description: Node.js version used for the release build.
        required: false
        type: string
        default: '22'
      release_flags:
        description: Optional flags passed to release.js, such as --draft or --replace-existing. The workflow always adds --use-existing-release-notes.
        required: false
        type: string
        default: ''
      plugin_repo_path:
        description: Workspace path where the plugin repo is checked out.
        required: false
        type: string
        default: plugin
    secrets:
      DEPENDENCY_CHECKOUT_TOKEN:
        required: false
      RELEASE_TOKEN:
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Validate release inputs
        run: |
          set -euo pipefail

          require_sha() {
            local name="$1"
            local ref="$2"
            if [[ ! "$ref" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "::error::$name must be a full 40-character commit SHA for deterministic release builds."
              exit 1
            fi
          }

          require_sha "obsidian_smart_env_ref" "${{ inputs.obsidian_smart_env_ref }}"
          require_sha "jsbrains_ref" "${{ inputs.jsbrains_ref }}"

      - name: Checkout plugin repo
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.plugin_repo_path }}

      - name: Checkout jsbrains
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/jsbrains
          ref: ${{ inputs.jsbrains_ref }}
          path: jsbrains
          token: ${{ secrets.DEPENDENCY_CHECKOUT_TOKEN || github.token }}

      - name: Checkout Smart Environment
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/obsidian-smart-env
          ref: ${{ inputs.obsidian_smart_env_ref }}
          path: obsidian-smart-env
          token: ${{ secrets.DEPENDENCY_CHECKOUT_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Log checked-out release refs
        run: |
          set -euo pipefail
          {
            echo "## Release dependency refs"
            echo
            for repo_dir in "${{ inputs.plugin_repo_path }}" jsbrains obsidian-smart-env; do
              if [ -d "$repo_dir/.git" ]; then
                echo "- $repo_dir: $(git -C "$repo_dir" rev-parse HEAD)"
              fi
            done
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Install jsbrains dependencies
        run: |
          set -euo pipefail
          cd jsbrains
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --fund=false
          fi

      - name: Install Smart Environment dependencies
        run: |
          set -euo pipefail
          cd obsidian-smart-env
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --fund=false
          fi

      - name: Install plugin repo
        working-directory: ${{ inputs.plugin_repo_path }}
        run: npm ci

      - name: Link jsbrains workspace packages
        run: |
          set -euo pipefail

          workspace_dir="$(pwd)"

          link_jsbrains_dir() {
            local node_modules_dir="$1"
            mkdir -p "$node_modules_dir"

            for package_dir in jsbrains/*/; do
              if [ ! -d "$package_dir" ]; then
                continue
              fi

              local package_base
              package_base="$(basename "$package_dir")"
              if [ "$package_base" = "node_modules" ]; then
                continue
              fi

              rm -rf "$node_modules_dir/$package_base"
              ln -s "$workspace_dir/${package_dir%/}" "$node_modules_dir/$package_base"

              local package_json="$package_dir/package.json"
              if [ -f "$package_json" ]; then
                local package_name
                package_name="$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).name || '')" "$package_json")"
                if [ -n "$package_name" ] && [ "$package_name" != "$package_base" ]; then
                  if [[ "$package_name" == @*/* ]]; then
                    mkdir -p "$node_modules_dir/${package_name%/*}"
                  fi

                  rm -rf "$node_modules_dir/$package_name"
                  ln -s "$workspace_dir/${package_dir%/}" "$node_modules_dir/$package_name"
                fi
              fi
            done
          }

          link_jsbrains_dir "${{ inputs.plugin_repo_path }}/node_modules"
          link_jsbrains_dir "obsidian-smart-env/node_modules"
          link_jsbrains_dir "${{ inputs.plugin_repo_path }}/node_modules/obsidian-smart-env/node_modules"

      - name: Validate precompiled release notes
        working-directory: ${{ inputs.plugin_repo_path }}
        run: |
          set -euo pipefail
          if [ ! -s releases/latest_release.md ]; then
            echo "::error::Missing committed releases/latest_release.md. Run releases/run_format_release_notes.js before dispatching this workflow."
            exit 1
          fi

      - name: Run release script
        working-directory: ${{ inputs.plugin_repo_path }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          printf "\n" | node release.js --use-existing-release-notes ${{ inputs.release_flags }}

      - name: Collect release assets for attestation
        id: release_assets
        run: |
          set -euo pipefail

          plugin_path="${{ inputs.plugin_repo_path }}"
          manifest_path="$plugin_path/dist/manifest.json"
          main_path="$plugin_path/dist/main.js"
          styles_path="$plugin_path/dist/styles.css"

          for required_path in "$manifest_path" "$main_path"; do
            if [ ! -f "$required_path" ]; then
              echo "::error::Missing required release asset: $required_path"
              exit 1
            fi
          done

          {
            echo "subject_path<<EOF"
            echo "$manifest_path"
            echo "$main_path"
            if [ -f "$styles_path" ]; then
              echo "$styles_path"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attest Obsidian release assets
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.release_assets.outputs.subject_path }}
